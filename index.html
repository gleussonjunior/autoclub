<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoClub</title>
<style>
:root {
  --bg:#f5f5f7; --white:#ffffff; --blue:#0071e3; --blue2:#0058b0;
  --text:#1d1d1f; --muted:#6e6e73; --border:#d2d2d7; --radius:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
header{position:sticky;top:0;z-index:100;height:52px;background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;padding:0 24px;gap:16px;}
.logo{display:flex;flex-direction:column;flex-shrink:0;cursor:pointer;text-decoration:none;color:var(--text);line-height:1;gap:1px;}.logo-nome{font-size:1.4rem;font-weight:700;letter-spacing:-.4px;}.logo-sub{font-size:.55rem;font-weight:300;color:var(--muted);display:block;}
.garagem-select{font-family:inherit;font-size:.84rem;font-weight:500;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;outline:none;margin-left:auto;}
.profile-wrap{display:none;padding:20px 24px 0;max-width:1200px;margin:0 auto;animation:up .4s ease;}
.profile-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px;margin-bottom:0;}
.profile-header{display:flex;gap:20px;align-items:center;}
.profile-avatar-wrap{position:relative;width:80px;height:80px;flex-shrink:0;}
.profile-img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:1px solid var(--border);}
.profile-initials{position:absolute;inset:0;background:var(--bg);color:var(--blue);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:600;}
.profile-info-top{flex:1;}
.p-name{font-size:1.4rem;font-weight:700;letter-spacing:-.4px;margin-bottom:2px;}
.p-loc{font-size:.8rem;color:var(--muted);margin-bottom:12px;}.p-desc{font-size:.88rem;color:#555;line-height:1.55;margin-top:4px;margin-bottom:2px;white-space:pre-wrap;}


.stat-val{font-size:1.1rem;font-weight:700;line-height:1.1;}
.stat-lbl{font-size:.75rem;color:var(--muted);}
.profile-desc{font-size:.88rem;color:var(--text);line-height:1.4;max-width:600px;}
.profile-links{display:flex;gap:8px;flex-wrap:wrap;}
.btn-social{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:99px;font-size:.8rem;font-weight:600;text-decoration:none;transition:opacity .15s;color:#fff;}
.btn-social.wpp{background:#25D366;}
.btn-social.insta{background:#E1306C;}
.btn-social:hover{opacity:.85;}
.filters-wrap{padding:12px 24px 0;max-width:1248px;margin:0 auto;}
.filters{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:0 16px;height:48px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{padding:4px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;font-family:inherit;font-size:.81rem;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s;flex-shrink:0;}
.chip.active{background:var(--text);border-color:var(--text);color:#fff;}
.chip:hover:not(.active){border-color:#999;color:var(--text);}
.search-wrap{margin-left:auto;position:relative;flex-shrink:0;}
.search-wrap input{padding:6px 12px 6px 30px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.83rem;background:var(--bg);color:var(--text);width:190px;outline:none;transition:all .15s;}
.search-wrap input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,113,227,.1);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.main{padding:20px 24px 60px;max-width:1200px;margin:0 auto;}
.grid-meta{font-size:.85rem;font-weight:500;margin-bottom:14px;color:var(--text);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;animation:up .3s ease both;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.09);}
.card-img-wrap{position:relative;overflow:hidden;}
.card-img{width:100%;height:190px;object-fit:cover;display:block;transition:transform .35s;}
.card:hover .card-img{transform:scale(1.03);}
.card-ph{width:100%;height:190px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.badge{position:absolute;bottom:9px;right:9px;background:rgba(0,0,0,.42);color:#fff;font-size:.62rem;font-weight:500;padding:2px 7px;border-radius:5px;backdrop-filter:blur(6px);}
.card-body{padding:14px 16px 0;}
.vendedor-tag{font-size:.65rem;text-transform:uppercase;color:var(--blue);font-weight:700;letter-spacing:.5px;margin-bottom:4px;display:block;}
.card-name{font-size:1rem;font-weight:600;letter-spacing:-.3px;}
.card-year{font-size:.8rem;color:var(--muted);margin:2px 0 9px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px;}
.tag{font-size:.73rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:5px;border:1px solid var(--border);}
.card-footer{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.price{font-size:1.12rem;font-weight:700;letter-spacing:-.4px;flex-shrink:0;}
.card-btns{display:flex;gap:6px;}
.btn-detalhes{display:inline-flex;align-items:center;background:transparent;color:var(--blue);border:1.5px solid var(--blue);padding:6px 13px;border-radius:99px;font-family:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-detalhes:hover{background:var(--blue);color:#fff;}
.btn-wpp-card{display:inline-flex;align-items:center;justify-content:center;background:#25D366;color:#fff;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;text-decoration:none;transition:background .15s;flex-shrink:0;}
.btn-wpp-card:hover{background:#1ebe5d;}
.state{text-align:center;padding:70px 24px;color:var(--muted);}
.state .icon{font-size:2.2rem;margin-bottom:10px;}
.state p{font-size:.9rem;line-height:1.5;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:20px;max-width:560px;width:100%;max-height:92vh;overflow-y:auto;transform:scale(.96) translateY(8px);transition:transform .22s ease;box-shadow:0 20px 70px rgba(0,0,0,.22);}
.overlay.on .modal{transform:scale(1) translateY(0);}
.modal-gallery{position:relative;background:#111;border-radius:20px 20px 0 0;overflow:hidden;}
.gallery-main{width:100%;height:260px;object-fit:contain;background:#f5f7fa;display:block;}
.gallery-ph{width:100%;height:260px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:4rem;}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);color:#fff;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .15s;backdrop-filter:blur(4px);line-height:1;}
.gallery-nav:hover{background:rgba(0,0,0,.7);}
.gallery-prev{left:10px;}
.gallery-next{right:10px;}
.gallery-counter{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.45);color:#fff;font-size:.68rem;font-weight:500;padding:2px 8px;border-radius:99px;backdrop-filter:blur(4px);}
.gallery-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.gdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);border:none;cursor:pointer;padding:0;transition:background .15s;}
.gdot.on{background:#fff;}
.gallery-thumbs{display:flex;gap:6px;padding:7px 10px;background:#111;overflow-x:auto;scrollbar-width:none;}
.gallery-thumbs::-webkit-scrollbar{display:none;}
.gthumb{width:52px;height:38px;object-fit:cover;border-radius:5px;cursor:pointer;opacity:.45;transition:all .15s;flex-shrink:0;border:2px solid transparent;}
.gthumb.on{opacity:1;border-color:var(--blue);}
.modal-body{padding:18px 22px 24px;}
.m-cod{font-size:.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.m-title{font-size:1.45rem;font-weight:700;letter-spacing:-.4px;margin-bottom:1px;}
.m-year{color:var(--muted);font-size:.86rem;margin-bottom:16px;}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:12px;}
.m-field{background:var(--white);padding:10px 13px;}
.m-field label{font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:500;display:block;margin-bottom:2px;}
.m-field span{font-size:.9rem;font-weight:500;}
.m-op{background:var(--bg);border-radius:9px;padding:10px 13px;margin-bottom:14px;border:1px solid var(--border);}
.m-op strong{font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);display:block;margin-bottom:3px;}
.m-op span{font-size:.86rem;color:var(--muted);line-height:1.5;}
.m-btns{display:flex;gap:7px;flex-wrap:wrap;}
.btn-wpp-modal{flex:1;min-width:130px;background:#25D366;color:#fff;border:none;padding:11px 16px;border-radius:99px;font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s;text-align:center;}
.btn-wpp-modal svg{flex-shrink:0;align-self:center;}
.btn-wpp-modal:hover{background:#1ebe5d;}
.btn-share{padding:11px 14px;border:1px solid var(--border);border-radius:99px;background:transparent;font-family:inherit;cursor:pointer;font-size:.84rem;color:var(--text);display:flex;align-items:center;gap:5px;transition:all .15s;}
.btn-share:hover{background:var(--bg);}
.btn-share.ok{border-color:#34c759;color:#34c759;}
.btn-fechar{padding:11px 16px;border:1px solid var(--border);border-radius:99px;background:transparent;font-family:inherit;cursor:pointer;font-size:.84rem;color:var(--muted);}
.btn-fechar:hover{background:var(--bg);}
footer{text-align:center;padding:22px;border-top:1px solid var(--border);font-size:.74rem;color:var(--muted);}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  header,.filters-wrap,.main{padding-left:16px;padding-right:16px;}
  .profile-wrap{padding-left:16px;padding-right:16px;}
  .grid,.m-grid{grid-template-columns:1fr;}
  .search-wrap,.search-wrap input{width:100%;margin-left:0;}
  .btn-wpp-card{flex-shrink:0;}
}


.tela-home{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:28px;padding:40px 32px;text-align:center;background:#fff;}
.tela-home.ativo{display:flex;}
.th-nome{font-size:3rem;font-weight:700;letter-spacing:-.5px;color:#111;line-height:1;}
.th-sub{font-size:.85rem;font-weight:300;color:#aaa;letter-spacing:.22em;margin-top:6px;}
.th-div{width:40px;height:1px;background:#e5e5e5;}
.th-msg{font-size:1rem;color:#555;line-height:1.75;font-weight:300;}
.th-msg strong{color:#111;font-weight:600;}
.th-btn{display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;padding:14px 28px;border-radius:99px;font-size:.92rem;font-weight:600;}
.th-rodape{font-size:.7rem;color:#ccc;}
#site-wrap{display:none;}
</style>
</head>

        </a>
        <button class="btn-share" id="m-share" onclick="compartilhar()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Compartilhar
        </button>
        <button class="btn-fechar" onclick="fechar()">Fechar</button>
      </div>
    </div>
  </div>
</div>
<footer>AutoClub</footer>
</div>

<script>
var SHEET_ID = "1oOJZdrgEPvm9J1vTYYk-r2Y7sj00aH6hQcGvsgwLEsM";
var garajeiros=[],todosCarros=[],slugAtual="",filtrados=[],marcaAtiva="todos",buscaAtiva="";
var fotosModal=[],fotoAtual=0,carroModal=null;

// CONTROLE DE ACESSO
// LOJA:  ?garajeiro=slug      → só vê aquela loja, sem filtro de garajeiro
// PRO:   ?token=TOKEN_PRO     → vê tudo, com seletor de garajeiros
// ADMIN: ?admin=SENHA_ADMIN   → igual Pro (expansível no futuro)
var TOKEN_PRO="ACpro-2026-x7mK";
var TOKEN_ADMIN="932050Gg";
var _p=new URLSearchParams(window.location.search);
var _modo=(function(){
  if(_p.get("admin")===TOKEN_ADMIN) return "admin";
  if(_p.get("token")===TOKEN_PRO)   return "pro";
  if(_p.get("garajeiro"))           return "loja";
  return "restrito";
})();
var _slugLoja=_modo==="loja"?(_p.get("garajeiro")||""):"";

function lerAba(aba){
  var url="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json&headers=1&sheet="+encodeURIComponent(aba);
  return fetch(url).then(function(r){return r.text();}).then(function(t){
    var d=JSON.parse(t.slice(t.indexOf("{"),t.lastIndexOf("}")+1));
    var cols=d.table.cols.map(function(c){return(c&&c.label)?c.label.trim():"";});
    return d.table.rows.filter(function(r){return r.c&&r.c.some(function(c){return c&&c.v!=null;});}).map(function(r){
      var o={};
      cols.forEach(function(col,i){if(col!=="")o[col]=(r.c[i]&&r.c[i].v!=null)?String(r.c[i].v).trim():"";});
      return o;
    });
  });
}

function mostrarHome(){
  document.getElementById("tela-home").classList.add("ativo");
}
function mostrarSite(){
  document.getElementById("tela-home").style.display="none";
  document.getElementById("site-wrap").style.display="block";
}
function init(){
  if(_modo==="restrito"){mostrarHome();return;}
  mostrarSite();
  Promise.all([lerAba("Garajeiros"),lerAba("Carros")]).then(function(res){
    garajeiros=res[0]; todosCarros=res[1];
    var sel=document.getElementById("sel-garagem");
    var header=document.querySelector("header");

    if(_modo==="loja"){
      // Modo loja: esconde seletor e logo clicável, trava no garajeiro
      sel.style.display="none";
      var logo=document.getElementById("logo-link");
      if(logo){logo.style.pointerEvents="none";logo.style.cursor="default";}
      slugAtual=garajeiros.some(function(g){return g.Slug===_slugLoja;})?_slugLoja:"";
    } else {
      // Modo pro/admin: seletor visível com todos os garajeiros
      sel.innerHTML='<option value="">Todos os Veículos</option>';
      garajeiros.filter(function(g){return g.Slug&&g.Nome;}).forEach(function(g){
        var o=document.createElement("option");o.value=g.Slug;o.textContent=g.Nome;sel.appendChild(o);
      });
      var su=_p.get("garajeiro")||"";
      slugAtual=garajeiros.some(function(g){return g.Slug===su;})?su:"";
      sel.value=slugAtual;
    }
    carregar();
  }).catch(function(e){
    console.error(e);
    document.getElementById("grid").innerHTML='<div class="state"><div class="icon">⚠️</div><p>Não foi possível conectar à base de dados.</p></div>';
  });
}

function irParaHome(e){
  e.preventDefault();
  if(_modo==="loja") return; // loja não pode sair da vitrine
  trocar("");
}
function trocarGaragem(s){if(_modo!=="loja") trocar(s);}
function trocar(slug){
  if(_modo==="loja") return; // trava no slug da loja
  slugAtual=slug;
  var base=window.location.pathname;
  var extra=_modo==="admin"?"?admin="+TOKEN_ADMIN:(_modo==="pro"?"?token="+TOKEN_PRO:"");
  var qs=slug?"?garajeiro="+slug+(extra?"&"+extra.slice(1):""):extra;
  window.history.pushState({},'',(qs?base+qs:base));
  document.getElementById("sel-garagem").value=slug;
  marcaAtiva="todos"; buscaAtiva=""; document.getElementById("inp-busca").value="";
  carregar();
}

function carregar(){
  var pw=document.getElementById("profile-wrap");
  if(slugAtual===""){pw.style.display="none";}
  else{
    var g=garajeiros.find(function(x){return x.Slug===slugAtual;})||{};
    document.getElementById("p-nome").textContent=g.Nome||"";
    var desc=document.getElementById("p-desc");
    if(g.Descricao&&g.Descricao.trim()){desc.textContent=g.Descricao.trim();desc.style.display="block";}
    else desc.style.display="none";
    document.getElementById("p-initials").textContent=(g.Nome||"V")[0].toUpperCase();
    var img=document.getElementById("p-img"); img.style.display="none";
    document.getElementById("p-initials").style.display="flex";
    if(g.FotoPerfil){img.src=fUrl(g.FotoPerfil);}
    if(g.Localizacao){document.getElementById("p-loc").textContent=g.Localizacao;document.getElementById("p-loc-wrap").style.display="block";}
    else document.getElementById("p-loc-wrap").style.display="none";
    var de=document.getElementById("p-desc");
    if(g.Descricao){de.textContent=g.Descricao;de.style.display="block";}else de.style.display="none";

    var tel=String(g.WhatsApp||"").replace(/\D/g,"");
    document.getElementById("p-wpp").href="https://wa.me/55"+tel;
    var li=document.getElementById("p-insta");
    if(g.Instagram){li.href=g.Instagram;li.style.display="inline-flex";}else li.style.display="none";
    pw.style.display="block";
  }
  var carros=base();
  var marcas=[]; carros.forEach(function(c){if(c.Marca&&!marcas.includes(c.Marca))marcas.push(c.Marca);});
  var bar=document.getElementById("filters");
  bar.querySelectorAll(".chip:not([data-marca='todos'])").forEach(function(b){b.remove();});
  bar.querySelector("[data-marca='todos']").classList.add("active");
  var sw=bar.querySelector(".search-wrap");
  marcas.sort().forEach(function(m){
    var b=document.createElement("button");b.className="chip";b.dataset.marca=m;b.textContent=m;
    b.onclick=function(){filtrar(this);}; bar.insertBefore(b,sw);
  });
  filtrados=carros; render();
}

function base(){
  return todosCarros.filter(function(c){
    var s=(c.Status||"").toLowerCase().trim(),d=(s==="disponivel"||s==="disponível");
    return slugAtual===""?d:(c.Garajeiro===slugAtual&&d);
  });
}
function filtrar(btn){
  document.querySelectorAll(".chip").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active"); marcaAtiva=btn.dataset.marca; aplicar();
}
function buscar(v){buscaAtiva=v.toLowerCase();aplicar();}
function aplicar(){
  filtrados=base().filter(function(c){
    return(marcaAtiva==="todos"||c.Marca===marcaAtiva)&&
      (!buscaAtiva||[c.Marca,c.Modelo,c.Cor,c.Garajeiro].some(function(f){return(f||"").toLowerCase().includes(buscaAtiva);}));
  }); render();
}

function fPreco(v){var n=parseInt(String(v||"").replace(/\D/g,""),10);return isNaN(n)?"Consulte":"R$ "+n.toLocaleString("pt-BR");}
function fKm(v){var n=parseInt(String(v||"").replace(/\D/g,""),10);return isNaN(n)?"0 km":n.toLocaleString("pt-BR")+" km";}
function fUrl(u){
  if(!u)return"";
  var m=String(u).match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  return m?"https://drive.google.com/uc?export=view&id="+m[1]:u;
}
function fotos(c){
  var f=[];
  ["Foto","Foto2","Foto3","Foto4"].forEach(function(k){var u=fUrl(c[k]);if(u)f.push(u);});
  return f;
}
function wpp(c){
  var g=garajeiros.find(function(x){return x.Slug===c.Garajeiro;})||{};
  var tel=String(g.WhatsApp||"").replace(/\D/g,"");
  var msg="Olá! Vi no AutoClub e tenho interesse no "+(c.Marca||"")+" "+(c.Modelo||"")+" "+(c.Ano||"")+". Ainda está disponível?";
  return"https://wa.me/55"+tel+"?text="+encodeURIComponent(msg);
}

function render(){
  var meta=document.getElementById("meta"),grid=document.getElementById("grid");
  meta.textContent=slugAtual===""?"Vitrine Geral — "+filtrados.length+" veículos de parceiros":filtrados.length+" veículo(s) disponível(is)";
  if(!filtrados.length){grid.innerHTML='<div class="state"><div class="icon">🔍</div><p>Nenhum veículo encontrado.</p></div>';return;}
  grid.innerHTML=filtrados.map(function(c,i){
    var f=fUrl(c.Foto);
    var gn=(garajeiros.find(function(x){return x.Slug===c.Garajeiro;})||{}).Nome||"";
    return'<div class="card" style="animation-delay:'+(i*0.04)+'s">'
      +'<div class="card-img-wrap" onclick="abrirModal('+i+')">'
      +(f?'<img class="card-img" src="'+f+'" alt="Carro" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">':'')
      +'<div class="card-ph"'+(f?' style="display:none"':'')+'>🚗</div>'
      +(c.Codigo?'<div class="badge">'+c.Codigo+'</div>':'')
      +'</div>'
      +'<div class="card-body" onclick="abrirModal('+i+')">'
      +(slugAtual===""?'<span class="vendedor-tag">📍 '+gn+'</span>':"")
      +'<div class="card-name">'+(c.Marca||"")+" "+(c.Modelo||"")+'</div>'
      +'<div class="card-year">'+(c.Ano||"")+'</div>'
      +'<div class="tags">'
      +(c.Cor?'<span class="tag">'+c.Cor+'</span>':"")
      +(c.Km?'<span class="tag">'+fKm(c.Km)+'</span>':"")
      +(c.Combustivel?'<span class="tag">'+c.Combustivel+'</span>':"")
      +'</div></div>'
      +'<div class="card-footer">'
      +'<span class="price">'+fPreco(c.Preco)+'</span>'
      +'<div class="card-btns">'
      +'<button class="btn-detalhes" onclick="abrirModal('+i+')">Ver detalhes</button>'
      +'<a class="btn-wpp-card" href="'+wpp(c)+'" target="_blank" onclick="event.stopPropagation()" title="WhatsApp">'
      +'<svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>'
      +'</a>'
      +'</div></div></div>';
  }).join("");
}

function galeria(fs,idx){
  var el=document.getElementById("m-gallery");
  if(!fs.length){el.innerHTML='<div class="gallery-ph">🚗</div>';return;}
  var multi=fs.length>1;
  el.innerHTML=(fs[idx]?'<img class="gallery-main" id="gmain" src="'+fs[idx]+'" alt="foto">':'<div class="gallery-ph">🚗</div>')
    +(multi&&idx>0?'<button class="gallery-nav gallery-prev" onclick="goFoto('+(idx-1)+')">&#8249;</button>':"")
    +(multi&&idx<fs.length-1?'<button class="gallery-nav gallery-next" onclick="goFoto('+(idx+1)+')">&#8250;</button>':"")
    +(multi?'<div class="gallery-counter">'+(idx+1)+' / '+fs.length+'</div>':"")
    +(multi?'<div class="gallery-dots">'+fs.map(function(_,i){return'<button class="gdot'+(i===idx?' on':'')+'" onclick="goFoto('+i+')"></button>';}).join("")+'</div>':"")
    +(multi?'<div class="gallery-thumbs">'+fs.map(function(f,i){return'<img class="gthumb'+(i===idx?' on':'')+'" src="'+f+'" onclick="goFoto('+i+')" onerror="this.style.display=\'none\'">';}).join("")+'</div>':"");
}
function goFoto(i){if(i>=0&&i<fotosModal.length){fotoAtual=i;galeria(fotosModal,i);}}

function abrirModal(i){
  var c=filtrados[i]; carroModal=c;
  var g=garajeiros.find(function(x){return x.Slug===c.Garajeiro;})||{};
  document.getElementById("m-cod").textContent=slugAtual===""?"Vendido por: "+(g.Nome||"Parceiro"):(c.Codigo?"Cód. "+c.Codigo:"");
  document.getElementById("m-title").textContent=(c.Marca||"")+" "+(c.Modelo||"");
  document.getElementById("m-year").textContent=c.Ano?"Ano "+c.Ano:"";
  document.getElementById("m-preco").textContent=fPreco(c.Preco);
  document.getElementById("m-cor").textContent=c.Cor||"–";
  document.getElementById("m-km").textContent=fKm(c.Km);
  document.getElementById("m-comb").textContent=c.Combustivel||"–";
  var mo=document.getElementById("m-op");
  if(c.Opcionais){mo.style.display="block";document.getElementById("m-op-txt").textContent=c.Opcionais;}else mo.style.display="none";
  fotosModal=fotos(c); fotoAtual=0; galeria(fotosModal,0);
  document.getElementById("m-wpp").href=wpp(c);
  var sb=document.getElementById("m-share");
  sb.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Compartilhar';
  sb.classList.remove("ok");
  document.getElementById("overlay").classList.add("on");
  document.body.style.overflow="hidden";
}

function compartilhar(){
  if(!carroModal)return;
  var c=carroModal;
  var url=window.location.origin+window.location.pathname+"?garajeiro="+c.Garajeiro+(c.Codigo?"&carro="+c.Codigo:"");
  if(navigator.share){navigator.share({title:c.Marca+" "+c.Modelo,url:url});}
  else{
    navigator.clipboard.writeText(url).then(function(){
      var b=document.getElementById("m-share");
      b.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Link copiado!';
      b.classList.add("ok");
      setTimeout(function(){
        b.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Compartilhar';
        b.classList.remove("ok");
      },2500);
    });
  }
}

function fechar(e){
  if(e&&e.target!==document.getElementById("overlay"))return;
  document.getElementById("overlay").classList.remove("on");
  document.body.style.overflow="";
}

var txStart=0;
document.getElementById("overlay").addEventListener("touchstart",function(e){txStart=e.touches[0].clientX;});
document.getElementById("overlay").addEventListener("touchend",function(e){
  var d=txStart-e.changedTouches[0].clientX;
  if(Math.abs(d)>50)goFoto(d>0?fotoAtual+1:fotoAtual-1);
});
document.addEventListener("keydown",function(e){
  if(e.key==="Escape")fechar();
  if(e.key==="ArrowRight")goFoto(fotoAtual+1);
  if(e.key==="ArrowLeft")goFoto(fotoAtual-1);
});

init();
</script>
</body>
</html>
