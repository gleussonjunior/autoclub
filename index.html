<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoClub - Estoque Digital</title>
    <style>
        /* CONFIGURAÇÕES GERAIS E ALINHAMENTO */
        :root {
            --primary-color: #007bff;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --max-width: 1200px; /* Largura padrão para todos os containers */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* CONTAINER MESTRE PARA ALINHAMENTO HORIZONTAL */
        .container-align {
            max-width: var(--max-width);
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* PERFIL DO GARAJEIRO (CORRIGIDO) */
        .profile-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            /* Garante que o perfil ocupe a mesma largura do filtro */
            width: 100%;
            box-sizing: border-box;
        }

        /* FILTRO (CORRIGIDO) */
        .filter-section {
            width: 100%;
            box-sizing: border-box;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: #444;
            color: white;
            font-size: 16px;
        }

        /* GRID DE CARROS */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* CARD DO CARRO */
        .car-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .car-card:hover {
            transform: translateY(-5px);
        }

        .car-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .car-info {
            padding: 15px;
        }

        .car-price {
            font-size: 1.4em;
            font-weight: bold;
            color: #2ecc71;
            margin: 10px 0;
        }

        /* NOVO BOTÃO DE DETALHES */
        .btn-view-details {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 12px 0;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 15px;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-view-details:hover {
            background-color: #0056b3;
        }

        /* GALERIA DE FOTOS (DENTRO DO CARD/MODAL) */
        .extra-photos-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .thumb-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.7;
        }

        .thumb-img:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .container-align { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="container-align">
        
        <header class="profile-section">
            <h1 id="garajeiro-nome">Carregando Vendedor...</h1>
            <p id="garajeiro-info">Localização | WhatsApp</p>
        </header>

        <section class="filter-section">
            <input type="text" class="search-input" placeholder="Buscar por modelo, marca ou ano...">
        </section>

        <main class="inventory-grid" id="car-list">
            </main>

    </div>

    <script>
        // Lógica de Processamento das Fotos (Simulação do que viria da Planilha)
        function renderCars(estoque) {
            const list = document.getElementById('car-list');
            list.innerHTML = '';

            estoque.forEach(carro => {
                // Tratamento da coluna "Fotos Extras" (URLs separadas por vírgula)
                const fotosExtras = carro.fotos_extras ? carro.fotos_extras.split(',') : [];
                
                const card = `
                    <div class="car-card">
                        <img src="${carro.foto_principal}" class="car-img" alt="${carro.modelo}">
                        <div class="car-info">
                            <h3>${carro.modelo}</h3>
                            <p>${carro.ano} | ${carro.km} km</p>
                            <div class="car-price">R$ ${carro.preco}</div>
                            
                            <div class="extra-photos-container">
                                ${fotosExtras.map(url => `<img src="${url.trim()}" class="thumb-img">`).join('')}
                            </div>

                            <button class="btn-view-details" onclick="verDetalhes('${carro.id}')">
                                VER DETALHES
                            </button>
                        </div>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        // Função para simular a abertura do card (pode ser um Modal ou nova página)
        function verDetalhes(id) {
            alert("Abrindo detalhes do veículo ID: " + id + ". Aqui você pode carregar a galeria completa da planilha.");
        }
    </script>
</body>
</html>
