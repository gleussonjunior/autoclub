<script>

const CONFIG = {
  SHEET_ID: "12kpq3U5hq2ZO1HMpyOdY_T2z1L2avq-Q",
  ABA_GARAJEIROS: "Garajeiros",
  ABA_CARROS: "Carros"
};

const params = new URLSearchParams(window.location.search);
const SLUG = params.get("garajeiro");

let garajeiro = null;
let carros = [];

function slugify(text){
  return text?.toString().toLowerCase().trim();
}

function convertDriveLink(url){

  if(!url) return "";

  if(url.includes("drive.google.com")){
    const match = url.match(/\/d\/([^/]+)/);
    if(match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
  }

  return url;
}

function formatPrice(price){

  const n = Number(price);

  if(isNaN(n)) return price;

  return n.toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });

}

async function carregarGarajeiro(){

  const res = await fetch(
    `https://opensheet.elk.sh/${CONFIG.SHEET_ID}/${CONFIG.ABA_GARAJEIROS}`
  );

  const lista = await res.json();

  return lista.find(g =>
    slugify(g.Slug) === slugify(SLUG)
  );

}

async function carregarCarros(){

  const res = await fetch(
    `https://opensheet.elk.sh/${CONFIG.SHEET_ID}/${CONFIG.ABA_CARROS}`
  );

  const lista = await res.json();

  return lista.filter(c =>
    slugify(c.Garajeiro) === slugify(SLUG)
    && c.Status === "Disponível"
  );

}

function renderGarajeiro(){

  document.getElementById("header").innerText =
    garajeiro.Nome;

}

function renderCarros(){

  const grid = document.getElementById("grid");

  if(carros.length === 0){
    grid.innerHTML = "Nenhum carro disponível";
    return;
  }

  grid.innerHTML = carros.map(c => `

    <div class="card">

      <img src="${convertDriveLink(c.Foto)}">

      <div class="card-body">

        <div class="title">
          ${c.Marca} ${c.Modelo}
        </div>

        <div>
          ${c.Ano} • ${c.KM} km
        </div>

        <div class="price">
          ${formatPrice(c.Preço)}
        </div>

      </div>

    </div>

  `).join("");

}

async function init(){

  try{

    garajeiro = await carregarGarajeiro();

    if(!garajeiro){
      document.getElementById("grid").innerHTML =
        "Garajeiro não encontrado";
      return;
    }

    carros = await carregarCarros();

    renderGarajeiro();

    renderCarros();

  }
  catch(e){

    console.error(e);

    document.getElementById("grid").innerHTML =
      "Erro ao carregar dados";

  }

}

init();

</script>
