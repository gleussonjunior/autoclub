<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoClub - Oficial</title>
    <style>
        :root { --max-width: 1200px; --primary: #007bff; }
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        
        /* ALINHAMENTO HORIZONTAL PERFEITO */
        .container { max-width: var(--max-width); margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        .profile-card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .filter-box { width: 100%; margin-bottom: 20px; }
        .filter-box input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; }
        .price { color: #2ecc71; font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        
        .btn-detalhes { display: block; width: 100%; padding: 12px; background: var(--primary); color: #fff; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; }
        
        .mini-fotos { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; }
        .mini-fotos img { width: 50px; height: 40px; border-radius: 4px; border: 1px solid #555; }
    </style>
</head>
<body>

    <div class="container">
        <header id="perfil-vendedor" class="profile-card">
            <h1 id="nome-garajeiro">Carregando...</h1>
            <p id="info-garajeiro"></p>
        </header>

        <div class="filter-box">
            <input type="text" placeholder="Pesquisar modelo ou marca...">
        </div>

        <div id="vitrine" class="grid"></div>
    </div>

    <script>
        // Função que você deve chamar ao receber os dados da planilha
        function renderizarPagina(dadosCarros, dadosVendedor) {
            // 1. Atualiza Perfil
            if(dadosVendedor) {
                document.getElementById('nome-garajeiro').innerText = dadosVendedor.Nome || "Vendedor";
                document.getElementById('info-garajeiro').innerText = (dadosVendedor.Cidade || "") + " | " + (dadosVendedor.Localizacao || "");
            }

            // 2. Atualiza Vitrine
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = '';

            dadosCarros.forEach(carro => {
                const fotosExtras = carro.fotos_extras ? carro.fotos_extras.split(',') : [];
                const precoFormatado = Number(carro.Preco).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                
                // Aceita KM ou quilometragem
                const km = carro.KM || carro.quilometragem || "0";

                vitrine.innerHTML += `
                    <div class="card">
                        <img src="${carro.foto_principal}" alt="${carro.Modelo}">
                        <div class="card-body">
                            <h3>${carro.Marca} ${carro.Modelo}</h3>
                            <p>${carro.Ano} | ${km} KM</p>
                            <div class="price">${precoFormatado}</div>
                            
                            <div class="mini-fotos">
                                ${fotosExtras.map(url => `<img src="${url.trim()}">`).join('')}
                            </div>

                            <button class="btn-detalhes" onclick="alert('WhatsApp: ${carro.WhatsApp}')">
                                VER DETALHES
                            </button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
