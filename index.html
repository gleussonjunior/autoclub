<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoClub - Gestão de Estoque</title>
    <style>
        :root {
            --primary-color: #007bff;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --max-width: 1200px; 
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* ALINHAMENTO HORIZONTAL UNIFICADO */
        .main-container {
            max-width: var(--max-width);
            margin: 0 auto;
            width: 100%;
        }

        /* PERFIL DO GARAJEIRO */
        .profile-header {
            background: linear-gradient(145deg, #1e1e1e, #252525);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box; /* Garante que o padding não aumente a largura */
        }

        /* FILTRO ALINHADO */
        .filter-container {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            outline: none;
        }

        /* GRID DE VEÍCULOS */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* CARD DO CARRO */
        .car-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .main-thumb {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
        }

        .price-tag {
            font-size: 1.5rem;
            color: #2ecc71;
            font-weight: 800;
            margin: 10px 0;
        }

        /* GALERIA DE MINIATURAS NO CARD */
        .mini-gallery {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .mini-thumb {
            width: 60px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
        }

        /* BOTÃO "VER DETALHES" */
        .btn-more {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-more:hover {
            background: #0056b3;
            transform: scale(1.02);
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .profile-header { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <header class="profile-header" id="header-vendedor">
            <h1 id="nome-vendedor">Carregando estoque...</h1>
            <p id="cidade-vendedor">Aguardando conexão com a planilha</p>
        </header>

        <div class="filter-container">
            <input type="text" class="search-bar" placeholder="Digite o modelo ou marca que procura...">
        </div>

        <div class="cars-grid" id="lista-carros">
            </div>

    </div>

    <script>
        // Função para simular o recebimento de dados da Planilha
        // No seu código real, o Make.com ou o Fetch preenche esta variável
        function atualizarInterface(dadosEstoque, dadosVendedor) {
            
            // Atualiza Perfil (Alinhado)
            if(dadosVendedor) {
                document.getElementById('nome-vendedor').innerText = dadosVendedor.nome;
                document.getElementById('cidade-vendedor').innerText = dadosVendedor.cidade;
            }

            const grid = document.getElementById('lista-carros');
            grid.innerHTML = '';

            dadosEstoque.forEach(carro => {
                // Processa as fotos extras (coluna nova que você vai criar)
                const extras = carro.fotos_extras ? carro.fotos_extras.split(',') : [];
                
                const htmlCard = `
                    <article class="car-card">
                        <img src="${carro.foto_principal}" class="main-thumb" alt="${carro.modelo}">
                        <div class="card-content">
                            <h3>${carro.modelo}</h3>
                            <p>${carro.ano} • ${carro.quilometragem} km</p>
                            <div class="price-tag">R$ ${carro.preco}</div>
                            
                            <div class="mini-gallery">
                                ${extras.map(url => `<img src="${url.trim()}" class="mini-thumb">`).join('')}
                            </div>

                            <button class="btn-more" onclick="alert('Abrindo detalhes do ${carro.modelo}')">
                                Ver Detalhes
                            </button>
                        </div>
                    </article>
                `;
                grid.innerHTML += htmlCard;
            });
        }

        /* IMPORTANTE: 
           Como você usa a planilha como banco, certifique-se de que o seu script 
           de conexão (Fetch API) mapeie:
           'Fotos' -> agora é 'foto_principal'
           'fotos_extras' -> nova coluna
        */
    </script>
</body>
</html>
