<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoClub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,sans-serif;
background:#f5f5f7;
margin:0;
padding:0;
}

header{
background:#fff;
padding:15px 20px;
border-bottom:1px solid #ddd;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
border:1px solid #ddd;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.title{
font-weight:600;
font-size:18px;
}

.price{
color:#0071e3;
font-weight:600;
margin-top:8px;
}

.loading{
padding:40px;
text-align:center;
}

</style>
</head>
<body>

<header id="header">Carregando...</header>

<div id="grid" class="grid">
<div class="loading">Carregando veículos...</div>
</div>

<script>

const CONFIG = {
  SHEET_ID: "12kpq3U5hq2ZO1HMpyOdY_T2z1L2avq-Q",
  ABA_GARAJEIROS: "Garajeiros",
  ABA_CARROS: "Carros"
};

const params = new URLSearchParams(window.location.search);
const SLUG = params.get("garajeiro") || "";

let garajeiro = null;
let carros = [];

function slugify(text){
return text
.toString()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/\s+/g,"-");
}

function formatPrice(price){

if(!price) return "";

// remove R$, pontos e espaços
const clean = price
.toString()
.replace("R$","")
.replace(/\./g,"")
.replace(/,/g,"")
.trim();

const n = parseFloat(clean);

if(isNaN(n)) return price;

return "R$ " + n.toLocaleString("pt-BR");

}

async function carregarGarajeiro(){

const res = await fetch(
`https://opensheet.elk.sh/${CONFIG.SHEET_ID}/${CONFIG.ABA_GARAJEIROS}`
);

const lista = await res.json();

return lista.find(g => slugify(g.Slug) === slugify(SLUG));

}

async function carregarCarros(){

const res = await fetch(
`https://opensheet.elk.sh/${CONFIG.SHEET_ID}/${CONFIG.ABA_CARROS}`
);

const lista = await res.json();

return lista.filter(c =>
slugify(c.Garajeiro) === slugify(SLUG)
&& c.Status !== "Vendido"
);

}

function renderCarros(){

const grid = document.getElementById("grid");

if(carros.length === 0){

 grid.innerHTML = "Nenhum carro encontrado";
 return;

}

 grid.innerHTML = carros.map(c => `
 
 <div class="card">
 
 <img src="${convertDriveLink(c.Foto)}" />
 
 <div class="card-body">
 
 <div class="title">
 ${c.Marca} ${c.Modelo}
 </div>
 
 <div>${c.Ano}</div>
 
 <div class="price">
 ${formatPrice(c.Preço)}
 </div>
 
 </div>
 
 </div>
 
 `).join("");

}

function renderGarajeiro(){

 document.getElementById("header").innerText = garajeiro.Nome;

}

async function init(){

 try{

 garajeiro = await carregarGarajeiro();

 if(!garajeiro){
 document.getElementById("grid").innerHTML = "Garajeiro não encontrado";
 return;
 }

 carros = await carregarCarros();

 renderGarajeiro();
 renderCarros();

 }

 catch(e){

 console.error(e);
 document.getElementById("grid").innerHTML = "Erro ao carregar";

 }

}

function convertDriveLink(url){

if(!url) return "";

if(url.includes("drive.google.com")){

const match = url.match(/\/d\/([^/]+)/);

if(match && match[1]){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return url;

}

init();

</script>

</body>
</html>
